<!DOCTYPE html>  
<html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>2D Shooting Game</title>  
<style>  
body { margin:0; overflow:hidden; background:#111; }  

canvas {
display:block;
margin:auto;
background:#222;
width:100vw;
height:100vh;
}

#score { position:absolute; top:20px; left:20px; color:#fff; font-size:24px; }

.controls {
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
}

.btn {
width:80px;
height:60px;
font-size:28px;
border:none;
border-radius:10px;
background:#555;
color:#fff;
cursor:pointer;
}
.btn:active { background:#888; }
</style>

</head>  
<body>  

<div id="score">Score: 0</div>  

<div class="controls">  
  <button class="btn" id="leftBtn">←</button>  
  <button class="btn" id="fireBtn">FIRE</button>  
  <button class="btn" id="rightBtn">→</button>  
</div>  

<canvas id="gameCanvas"></canvas>

<script>  
const canvas = document.getElementById('gameCanvas');  
const ctx = canvas.getContext('2d');  

function resizeCanvas(){  
  canvas.width = window.innerWidth;  
  canvas.height = window.innerHeight - 100;  
}  
resizeCanvas();  

window.addEventListener('resize', ()=>{  
  resizeCanvas();  
  player.y = canvas.height - 100;  
  player.x = canvas.width / 2 - player.width / 2;  
});  

let score = 0;  
const player = {x:0, y:0, width:40, height:20, speed:5, health:10, maxHealth:10};  
const bullets = [];  
const enemies = [];  
let left=false, right=false;  

function initPlayer(){  
  player.x = canvas.width/2 - player.width/2;  
  player.y = canvas.height - 100;  
}  
initPlayer();  

document.addEventListener('keydown', e=>{  
  if(e.key==='ArrowLeft') left=true;  
  if(e.key==='ArrowRight') right=true;  
  if(e.key===' ') shoot();  
});  
document.addEventListener('keyup', e=>{  
  if(e.key==='ArrowLeft') left=false;  
  if(e.key==='ArrowRight') right=false;  
});  

function setupBtn(btn,onStart,onEnd){  
  btn.addEventListener('mousedown',onStart);  
  btn.addEventListener('mouseup',onEnd);  
  btn.addEventListener('touchstart', e=>{e.preventDefault(); onStart();});  
  btn.addEventListener('touchend', e=>{e.preventDefault(); onEnd();});  
}  
setupBtn(document.getElementById('leftBtn'), ()=>left=true, ()=>left=false);  
setupBtn(document.getElementById('rightBtn'), ()=>right=true, ()=>right=false);  
setupBtn(document.getElementById('fireBtn'), shoot, ()=>{});  

function shoot(){  
  bullets.push({x:player.x+player.width/2-5, y:player.y, width:10, height:20});  
}  

function spawnEnemy(){  
  const x = Math.random()*(canvas.width-40);  
  enemies.push({x:x,y:0,width:40,height:20,speed:2,health:3,maxHealth:3});  
}  
setInterval(spawnEnemy,1000);  

function update(){  
  if(left && player.x>0) player.x -= player.speed;  
  if(right && player.x<canvas.width-player.width) player.x += player.speed;  

  bullets.forEach((b,i)=>{  
    b.y -= 5;  
    if(b.y < -b.height) bullets.splice(i,1);  
  });  

  enemies.forEach((e,i)=>{  
    e.y += e.speed;  

    bullets.forEach((b,j)=>{  
      if(b.x<e.x+e.width && b.x+b.width>e.x &&  
         b.y<e.y+e.height && b.y+b.height>e.y){  
        bullets.splice(j,1);  
        e.health -=1;  
        if(e.health<=0){  
          enemies.splice(i,1);  
          score++;  
        }  
      }  
    });  

    if(e.x<player.x+player.width && e.x+e.width>player.x &&  
       e.y<player.y+player.height && e.y+e.height>player.y){  
      player.health--;  
      enemies.splice(i,1);  
      if(player.health<=0){  
        alert('Game Over! Score: '+score);  
        window.location.reload();  
      }  
    }  
  });  
}  

function draw(){  
  ctx.clearRect(0,0,canvas.width,canvas.height);  
  ctx.textAlign="center";  
  ctx.textBaseline="middle";  

  // 🔥 ukuran lebih kecil
  ctx.font = (canvas.height/20)+"px Arial";  

  ctx.fillText("🤠", player.x+player.width/2, player.y+player.height/2-50);  

  ctx.fillStyle="red";  
  ctx.fillRect(20,50,200*(player.health/player.maxHealth),15);  
  ctx.strokeStyle="white";  
  ctx.strokeRect(20,50,200,15);  
  ctx.fillStyle="white";  

  bullets.forEach(b=>ctx.fillText("💩", b.x+b.width/2, b.y+b.height/2));  

  enemies.forEach(e=>{  
    ctx.fillText("🤓", e.x+e.width/2, e.y+e.height/2);  
    ctx.fillStyle="red";  
    ctx.fillRect(e.x, e.y-8, e.width*(e.health/e.maxHealth),5);  
    ctx.fillStyle="white";  
  });  
}  

function loop(){  
  update();  
  draw();  
  document.getElementById('score').textContent = 'Score: '+score;  
  requestAnimationFrame(loop);  
}  
loop();  
</script>  

</body>  
</html>
